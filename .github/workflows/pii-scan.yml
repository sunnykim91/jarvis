name: PII Pattern Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pii-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run PII pattern scan
        run: |
          # 공개 패턴만 (캐논은 로컬에만 존재)
          # 일반적으로 OSS에 있어서는 안 되는 명백한 PII만 검사
          PATTERNS=(
            'owner-id'
            '010-[0-9]{4}-[0-9]{4}'
            '[0-9]{6}-[1-4][0-9]{6}'
            'BEGIN RSA PRIVATE KEY'
            'BEGIN OPENSSH PRIVATE KEY'
            'sk-ant-api03-'
            'ghp_[A-Za-z0-9]{36}'
            'AKIA[0-9A-Z]{16}'
          )

          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            # 워크플로우 자체 제외 — 패턴 정의가 PII로 오탐되는 것 방지
            matches=$(git grep -nE "$pattern" -- ':!node_modules' ':!*.lock' ':!.github/workflows/pii-scan.yml' || true)
            if [[ -n "$matches" ]]; then
              echo "❌ Pattern detected: $pattern"
              echo "$matches"
              FOUND=$((FOUND + 1))
            fi
          done

          if [[ $FOUND -gt 0 ]]; then
            echo ""
            echo "🚫 PII patterns detected. Block merge until resolved."
            exit 1
          fi
          echo "✅ No PII patterns found."
