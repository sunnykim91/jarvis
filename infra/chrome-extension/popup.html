<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Jarvis Job Crawler</title>
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, sans-serif;
      background: #1a1a2e;
      color: #eee;
      margin: 0;
    }
    h2 { margin: 0 0 12px; font-size: 16px; color: #7eb8f7; }
    .status { font-size: 12px; color: #aaa; margin-bottom: 12px; line-height: 1.6; }
    button {
      width: 100%;
      padding: 10px;
      background: #3a7bd5;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }
    button:hover { background: #2a6bc5; }
    button:disabled { background: #555; cursor: not-allowed; }
    #result { margin-top: 10px; font-size: 12px; color: #7eb8f7; min-height: 20px; }
  </style>
</head>
<body>
  <h2>🤖 Jarvis Job Crawler</h2>
  <div class="status" id="status">로딩 중...</div>
  <button id="runBtn">지금 바로 크롤링</button>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
